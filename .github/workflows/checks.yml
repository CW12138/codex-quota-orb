name: Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors)
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
      - name: Compile analytics module
        run: python -m py_compile UsageAnalytics.py
