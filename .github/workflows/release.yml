name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build portable package
        shell: pwsh
        run: |
          $packageFiles = @(
            'CodexRateWidget.ps1',
            'UsageAnalytics.py',
            'Watch-CodexAndLaunchWidget.ps1',
            'Launch-CodexRateWidget.vbs',
            'Launch-CodexRateWatcher.vbs',
            'Install-Startup.ps1',
            'Uninstall-Startup.ps1',
            'Install.ps1',
            'Install.cmd',
            'Uninstall.ps1',
            'Uninstall.cmd',
            'README.md',
            'CHANGELOG.md',
            'PRIVACY.md',
            'SECURITY.md',
            'LICENSE',
            'VERSION'
          )
          $hashLines = foreach ($style in @('Classic', 'Gradient')) {
            $packageDirectory = "dist\CodexQuotaOrb-$style"
            $archivePath = "dist\CodexQuotaOrb-$env:GITHUB_REF_NAME-$style.zip"
            New-Item -ItemType Directory -Path $packageDirectory | Out-Null
            Copy-Item -LiteralPath $packageFiles -Destination $packageDirectory
            Set-Content -LiteralPath (Join-Path $packageDirectory 'orb-style.txt') -Value $style -Encoding ascii
            Compress-Archive -Path $packageDirectory -DestinationPath $archivePath
            $hash = (Get-FileHash $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $(Split-Path -Leaf $archivePath)"
          }
          $hashLines | Set-Content dist\SHA256SUMS.txt -Encoding ascii
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            "dist\CodexQuotaOrb-$env:GITHUB_REF_NAME-Classic.zip" `
            "dist\CodexQuotaOrb-$env:GITHUB_REF_NAME-Gradient.zip" `
            "dist\SHA256SUMS.txt" `
            --title "Codex Quota Orb $env:GITHUB_REF_NAME" `
            --generate-notes
